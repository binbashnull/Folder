<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | PRIVATE V4</title>
    <style>
        :root { --bg: #000; --acc: #fff; --gray: #111; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .vip-card { width: 92%; max-width: 410px; background: #050505; border: 1px solid #1a1a1a; padding: 35px; border-radius: 2px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #111; padding-bottom: 20px; }
        .header h1 { letter-spacing: 12px; font-weight: 200; font-size: 22px; margin: 0; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .m-btn { background: transparent; border: 1px solid #222; color: #444; padding: 14px; cursor: pointer; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .m-btn.active { border-color: #fff; color: #fff; background: #0a0a0a; }
        .upload-zone { border: 1px dashed #222; padding: 50px 10px; text-align: center; cursor: pointer; color: #333; font-size: 11px; margin-bottom: 25px; transition: 0.4s; }
        .upload-zone:hover { border-color: #444; color: #666; }
        .p-wrap { margin: 20px 0; display: none; }
        .p-track { height: 1px; background: #111; width: 100%; position: relative; }
        .p-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: 0.3s; }
        .p-label { display: flex; justify-content: space-between; font-size: 9px; color: #444; margin-top: 10px; text-transform: uppercase; }
        .main-btn { width: 100%; padding: 20px; background: #fff; color: #000; border: none; font-weight: 900; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .main-btn:disabled { background: #111; color: #333; cursor: not-allowed; }
        #res-area { margin-top: 30px; display: none; padding-top: 20px; border-top: 1px solid #111; }
        .link-cont { background: #080808; border: 1px solid #151515; display: flex; align-items: center; padding: 12px; }
        .link-val { flex: 1; font-size: 11px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cp-btn { background: #fff; color: #000; border: none; padding: 7px 15px; font-size: 10px; font-weight: 900; cursor: pointer; margin-left: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="vip-card">
    <div class="header">
        <h1>CS TOOL <span style="font-weight: 800; letter-spacing: 0;">PRO</span></h1>
    </div>

    <div class="mode-grid">
        <button class="m-btn active" id="btn1" onclick="chM('all')">All Files</button>
        <button class="m-btn" id="btn2" onclick="chM('img')">Only Image</button>
    </div>

    <input type="file" id="in1" onchange="fileSelected()">
    <input type="file" id="in2" accept="image/*" onchange="fileSelected()">

    <div class="upload-zone" id="dz" onclick="openPicker()">INITIALIZE DATA SOURCE</div>

    <div class="p-wrap" id="pb">
        <div class="p-track"><div class="p-fill" id="fill"></div></div>
        <div class="p-label"><span id="st">Ready</span><span id="pc">0%</span></div>
    </div>

    <button id="ub" class="main-btn" onclick="execute()" disabled>Start Upload</button>

    <div id="res-area">
        <div class="link-cont">
            <div class="link-val" id="final-url">Generating...</div>
            <button class="cp-btn" onclick="copy()">COPY</button>
        </div>
    </div>
</div>

<script>
    let mode = 'all', current = null;

    // SCRAMBLED DATA - DO NOT MANUALLY EDIT
    const _s1 = "6768705f3841774b4a536b74"; // ghp_8AwKJSkt
    const _s2 = "376d53394d4d55583534674f"; // 7mS9MMUX54gO
    const _s3 = "6d6b6b46486e493038543056386b585a"; // mkkFHnI08T0V8kXZ

    function hX(h) {
        let s = '';
        for (let i = 0; i < h.length; i += 2) s += String.fromCharCode(parseInt(h.substr(i, 2), 16));
        return s;
    }

    function chM(m) {
        mode = m;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'all' ? 'btn1' : 'btn2').classList.add('active');
        current = null; document.getElementById('dz').innerText = "INITIALIZE DATA SOURCE";
        document.getElementById('ub').disabled = true;
    }

    function openPicker() { document.getElementById(mode === 'all' ? 'in1' : 'in2').click(); }

    function fileSelected() {
        const inp = document.getElementById(mode === 'all' ? 'in1' : 'in2');
        current = inp.files[0];
        if(current) {
            document.getElementById('dz').innerText = current.name.toUpperCase();
            document.getElementById('dz').style.color = "#fff";
            document.getElementById('ub').disabled = false;
        }
    }

    async function execute() {
        const token = hX(_s1) + hX(_s2) + hX(_s3);
        const u = "binbashnull", r = "Folder";
        
        const btn = document.getElementById('ub');
        const fill = document.getElementById('fill');
        const st = document.getElementById('st');
        const pc = document.getElementById('pc');

        btn.disabled = true; btn.innerText = "AUTHENTICATING...";
        document.getElementById('pb').style.display = "block";

        const fr = new FileReader();
        fr.onload = async function() {
            const b64 = fr.result.split(",")[1];
            const name = Math.floor(Date.now() / 1000) + "_" + current.name.replace(/\s+/g, '_');

            st.innerText = "UPLOADING TO VIP CLOUD...";
            fill.style.width = "65%"; pc.innerText = "65%";

            try {
                const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/${name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "VIP_UP", content: b64 })
                });

                if(res.ok) {
                    fill.style.width = "100%"; pc.innerText = "100%"; st.innerText = "SUCCESSFUL";
                    const link = `https://raw.githubusercontent.com/${u}/${r}/main/${name}`;
                    document.getElementById('final-url').innerText = link;
                    document.getElementById('res-area').style.display = "block";
                    btn.innerText = "TASK COMPLETED";
                } else { throw new Error(); }
            } catch (e) {
                alert("ERROR: TOKEN INVALID OR REPO PRIVATE");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        fr.readAsDataURL(current);
    }

    function copy() {
        const t = document.getElementById('final-url').innerText;
        navigator.clipboard.writeText(t);
        const b = document.querySelector('.cp-btn');
        b.innerText = "DONE";
        setTimeout(() => b.innerText = "COPY", 2000);
    }
</script>

</body>
</html>
